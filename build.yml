name: Build Windows EXE

# 触发条件：推送 tag（如 v1.0.0）时自动打包并发布 Release；
# 也支持手动触发（workflow_dispatch），方便测试
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: |
          pyinstaller --onefile --windowed --name AmazonInvoiceRenamer app.py

      - name: 上传构建产物 (Artifact，每次构建都有)
        uses: actions/upload-artifact@v4
        with:
          name: AmazonInvoiceRenamer-exe
          path: dist/AmazonInvoiceRenamer.exe

      - name: 发布 Release (仅当推送了 tag 时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AmazonInvoiceRenamer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
